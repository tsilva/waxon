<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="950" viewBox="0 0 1600 950">
  <defs>
    <filter id="shellShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#184233" flood-opacity="0.11"/>
    </filter>
    <style>
      .ui { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif; }
      .mono { font-family: "Red Hat Mono", "SF Mono", Menlo, Consolas, monospace; }
      .serif { font-family: Baskerville, "Iowan Old Style", Palatino, Georgia, serif; }
      .brand { fill: #07553f; font-weight: 760; letter-spacing: 0; }
      .ink { fill: #0e2821; }
      .soft { fill: #60736c; }
      .muted { fill: #8a9691; }
      .line { stroke: #ddd8ce; }
      .line2 { stroke: #ebe6dc; }
      .accent { fill: #118763; }
      .accentStroke { stroke: #118763; }
      .surface { fill: #fffdf8; }
      .surfaceSoft { fill: #f7f3ea; }
      .activeSoft { fill: #edf7f0; }
      .danger { fill: #a24335; }
      .tiny { font-size: 13px; }
      .small { font-size: 15px; }
      .body { font-size: 18px; }
      .title { font-size: 24px; font-weight: 650; }
      .label { font-size: 12px; text-transform: uppercase; letter-spacing: 0; font-weight: 650; }
      .chipText { font-size: 13px; font-weight: 620; }
    </style>
